# In order to enable the listings condition enum values to be localized, we need to add the following 
# translations to the activerecord.attributes.listing.conditions namespace. 
en:
  activerecord:
    attributes:
      listing:
        conditions:
          mint: New
          near_mint: As good as new
          used: Used
          defective: Defective
    errors:
      models:
        listing:
          attributes:
            tags:
              too_short: At least one tag must be specified
              too_long: You can't specifiy more than 5 tags
